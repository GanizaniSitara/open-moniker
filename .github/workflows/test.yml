name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libkrb5-dev
          pip install -e ".[dev,all]"
          pip install "mcp>=1.0.0" pyyaml httpx python-dateutil asgi-lifespan beautifulsoup4

      - name: Unit & integration tests
        run: pytest tests/ -v --tb=short -x --ignore=tests/test_mcp.py -m "not integration"

      - name: Start moniker service
        run: |
          python start.py &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8060/health && break
            sleep 1
          done

      - name: MCP tests
        env:
          MCP_URL: http://127.0.0.1:8060/mcp
        run: pytest tests/test_mcp.py -v --tb=short

  go-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run Go tests
        working-directory: resolver-go
        run: go test ./... -v -race

  java-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Java tests
        working-directory: resolver-java
        run: |
          cp ../sample_config.yaml config.yaml
          cp ../sample_catalog.yaml catalog.yaml
          mvn test -q
