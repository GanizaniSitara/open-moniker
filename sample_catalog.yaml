      database: RISK
      schema: GREEKS
      query: "SELECT portfolio_id, security_id, delta, gamma, vega, theta, rho\nFROM\
        \ POSITION_GREEKS\nWHERE portfolio_id = '{segments[0]}'\n  AND as_of_date\
        \ = TO_DATE('{segments[1]}', 'YYYYMMDD')\n"
risk.limits:
