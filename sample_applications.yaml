# Business Applications Configuration
# Tracks which applications consume or produce datasets and fields

murex:
  display_name: Murex
  description: Cross-asset trading and risk management platform
  category: Trading
  color: "#8E44AD"
  status: active
  owner: trading-tech@firm.com
  tech_lead: murex-support@firm.com
  support_channel: "#murex-support"
  datasets:
    - "prices.*/*"
    - "risk.cvar/*/*"
